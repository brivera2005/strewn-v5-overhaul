<?xml version="1.0" encoding="UTF-8"?>
<!--
  Strewn  Clinical Noir icon
  Central medical node with pain particles scattering outward ("strewn").
  Palette: midnight #0A0E17, teal #00D4AA, coral #FF4D6A, violet #7B61FF
  Designed on a 32×32 pixel grid, scaled for clarity at all sizes.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="256" height="256" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="#0A0E17"/>

  <!-- Violet network ring -->
  <rect x="14" y="4" width="4" height="2" fill="#7B61FF"/>
  <rect x="14" y="26" width="4" height="2" fill="#7B61FF"/>
  <rect x="4" y="14" width="2" height="4" fill="#7B61FF"/>
  <rect x="26" y="14" width="2" height="4" fill="#7B61FF"/>

  <!-- Diagonal violet spokes -->
  <rect x="8" y="8" width="2" height="2" fill="#7B61FF"/>
  <rect x="22" y="8" width="2" height="2" fill="#7B61FF"/>
  <rect x="8" y="22" width="2" height="2" fill="#7B61FF"/>
  <rect x="22" y="22" width="2" height="2" fill="#7B61FF"/>

  <!-- Teal connection lines -->
  <rect x="15" y="6" width="2" height="4" fill="#00D4AA" opacity="0.7"/>
  <rect x="15" y="22" width="2" height="4" fill="#00D4AA" opacity="0.7"/>
  <rect x="6" y="15" width="4" height="2" fill="#00D4AA" opacity="0.7"/>
  <rect x="22" y="15" width="4" height="2" fill="#00D4AA" opacity="0.7"/>
  <rect x="10" y="10" width="2" height="2" fill="#00D4AA" opacity="0.5"/>
  <rect x="20" y="10" width="2" height="2" fill="#00D4AA" opacity="0.5"/>
  <rect x="10" y="20" width="2" height="2" fill="#00D4AA" opacity="0.5"/>
  <rect x="20" y="20" width="2" height="2" fill="#00D4AA" opacity="0.5"/>

  <!-- Coral pain particles  strewn outward -->
  <rect x="2" y="3" width="2" height="2" fill="#FF4D6A"/>
  <rect x="5" y="1" width="2" height="2" fill="#FF4D6A"/>
  <rect x="28" y="2" width="2" height="2" fill="#FF4D6A"/>
  <rect x="26" y="5" width="2" height="2" fill="#FF4D6A"/>
  <rect x="1" y="14" width="2" height="2" fill="#FF4D6A"/>
  <rect x="29" y="15" width="2" height="2" fill="#FF4D6A"/>
  <rect x="3" y="27" width="2" height="2" fill="#FF4D6A"/>
  <rect x="6" y="29" width="2" height="2" fill="#FF4D6A"/>
  <rect x="27" y="28" width="2" height="2" fill="#FF4D6A"/>
  <rect x="25" y="26" width="2" height="2" fill="#FF4D6A"/>
  <rect x="12" y="1" width="2" height="2" fill="#FF4D6A" opacity="0.8"/>
  <rect x="18" y="2" width="2" height="2" fill="#FF4D6A" opacity="0.8"/>
  <rect x="1" y="20" width="2" height="2" fill="#FF4D6A" opacity="0.8"/>
  <rect x="29" y="22" width="2" height="2" fill="#FF4D6A" opacity="0.8"/>

  <!-- Mid-range coral scatter -->
  <rect x="9" y="5" width="1" height="1" fill="#FF4D6A" opacity="0.6"/>
  <rect x="22" y="6" width="1" height="1" fill="#FF4D6A" opacity="0.6"/>
  <rect x="5" y="11" width="1" height="1" fill="#FF4D6A" opacity="0.6"/>
  <rect x="26" y="12" width="1" height="1" fill="#FF4D6A" opacity="0.6"/>
  <rect x="7" y="25" width="1" height="1" fill="#FF4D6A" opacity="0.6"/>
  <rect x="24" y="24" width="1" height="1" fill="#FF4D6A" opacity="0.6"/>

  <!-- Central hub glow -->
  <rect x="13" y="13" width="6" height="6" fill="#00D4AA" opacity="0.25"/>
  <rect x="14" y="14" width="4" height="4" fill="#00D4AA" opacity="0.45"/>

  <!-- Core node -->
  <rect x="15" y="15" width="2" height="2" fill="#00D4AA"/>

  <!-- Stylized "S" hint via violet arc nodes -->
  <rect x="11" y="7" width="2" height="2" fill="#7B61FF" opacity="0.9"/>
  <rect x="19" y="9" width="2" height="2" fill="#7B61FF" opacity="0.9"/>
  <rect x="11" y="21" width="2" height="2" fill="#7B61FF" opacity="0.9"/>
  <rect x="19" y="23" width="2" height="2" fill="#7B61FF" opacity="0.9"/>
</svg>
